<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG Analysis Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .healthy {
            background-color: #d4edda;
            color: #155724;
        }
        .active {
            background-color: #cfe2ff;
            color: #084298;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Cloud-Based ECG Analysis Portal</h1>
    <div class="status active">
        <p><strong>Patient Data Syncing:</strong> Active</p>
    </div>
    <div class="status healthy">
        <p><strong>Server Status:</strong> Healthy</p>
    </div>
</body>
</html>
